# Render blueprint — deploy with one click from the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec
#
# Data now lives in MongoDB (Atlas), so no persistent disk is needed — the
# free plan is enough and nothing is lost across restarts or sleeps.
services:
  - type: web
    name: turkish-cat-delivery
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Set this in the Render dashboard (Environment tab) — same value as .env.
      - key: MONGODB_URI
        sync: false
